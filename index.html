<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="1-2 sentences that clearly explain what your webpage is about"
    />
    <meta name="author" content="Becci Miller" />
    <meta name="keywords" content="hashtags about your page" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          src="./images/spots-logo.svg"
          alt="Spots Logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__container">
            <img
              src="./images/avatar.jpg"
              class="profile__avatar"
              alt="Photo of Bessie Coleman"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Aviator</p>
              <button
                aria-label="Edit profile"
                type="button"
                class="profile__edit-button"
              >
                <img src="./images/pencil.svg" alt="Pencil Icon" />Edit Profile
              </button>
            </div>
          </div>
          <button
            aria-label="New post"
            type="button"
            class="profile__add-button"
          >
            <img src="./images/plus.svg" alt="Add Icon" />New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <button
                  aria-label="Delete card"
                  type="button"
                  class="card__delete-button"
                ></button>
                <img class="card__image" src="#" alt="" />
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button
                    aria-label="Like card"
                    type="button"
                    class="card__like-button"
                  ></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">2025 © Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <h2 class="modal__title">Edit profile</h2>
          <button
            aria-label="Close modal"
            type="button"
            class="modal__close-button"
          ></button>
          <form class="modal__form">
            <label for="input-profile-name" class="modal__label"
              >Name
              <input
                type="text"
                class="modal__input"
                id="input-profile-name"
                placeholder="Type your name"
                required
              />
            </label>
            <label for="input-profile-description" class="modal__label"
              >Description
              <input
                type="text"
                class="modal__input"
                id="input-profile-description"
                placeholder="Describe yourself"
                required
              />
            </label>
            <button
              aria-label="Save"
              type="submit"
              class="modal__submit-button"
            >
              Save
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <h2 class="modal__title">New post</h2>
          <button
            aria-label="Close"
            type="button"
            class="modal__close-button"
          ></button>
          <form class="modal__form">
            <label for="input-image-link" class="modal__label"
              >Image link
              <input
                type="text"
                class="modal__input"
                id="input-image-link"
                placeholder="Paste a link to the picture"
                required
              />
            </label>
            <label for="input-image-caption" class="modal__label"
              >Caption
              <input
                type="text"
                class="modal__input"
                id="input-image-caption"
                placeholder="Type your caption"
                required
              />
            </label>
            <button
              aria-label="Save"
              type="submit"
              class="modal__submit-button"
            >
              Save
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="preview-modal">
        <div class="modal__preview-container">
          <button
            aria-label="Close"
            type="button"
            class="modal__close-button modal__close-button_type_preview"
          ></button>
          <img src="#" alt="" class="modal__preview-image" />
          <p class="modal__preview-title"></p>
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
